<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RideBook — Your City, Your Ride</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --bg: #0c0c0f;
      --bg2: #111116;
      --surface: #16161d;
      --surface2: #1e1e28;
      --border: #2c2c3a;
      --accent: #f5c518;
      --accent-dim: rgba(245,197,24,0.12);
      --accent2: #ff6b35;
      --green: #22c55e;
      --red: #ef4444;
      --blue: #3b82f6;
      --text: #f0f0f5;
      --text2: #8888a0;
      --text3: #55556a;
      --font-head: "Bebas Neue", sans-serif;
      --font: "Plus Jakarta Sans", sans-serif;
      --r: 14px;
      --r-lg: 20px;
      --shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--surface); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    input, select, textarea {
      font-family: var(--font);
      font-size: 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    button { font-family: var(--font); cursor: pointer; }
    a { color: inherit; text-decoration: none; }
    .leaflet-container { background: #1a1a2e; }
  </style>
</head>
<body>
  <div id="root"></div>
  <!-- Razorpay Checkout -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
